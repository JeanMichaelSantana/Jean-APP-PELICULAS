<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Películas Populares • TMDB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center display-4 fw-bold text-white mb-4">
            🎬 Películas Populares TMDB
        </h1>

        <!-- Caja de búsqueda dinámica -->
        <div class="row justify-content-center mb-5">
            <div class="col-lg-6">
                <div class="input-group input-group-lg">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" id="searchInput" class="form-control" placeholder="Buscar película..." autocomplete="off">
                </div>
            </div>
        </div>

        <!-- Contenedor de tarjetas -->
        <div id="moviesContainer" class="row g-4"></div>

        <!-- Paginación -->
        <div class="d-flex justify-content-center mt-5" id="pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./main.js"></script>
</body>
</html>
